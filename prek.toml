# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json

[[repos]]
repo = "local"

[[repos.hooks]]
id = "update-help-translation-templates"
name = "Update help file translation templates"
description = "Regenerates resources/help/translations/templates/*.pot from the help source files."
entry = "packaging/update_help_translation_templates.py"
language = "python"
additional_dependencies = ["sphinx", "sphinx_rtd_theme"]
files = "^resources/help/"
pass_filenames = false

[[repos.hooks]]
id = "lint-cpp"
name = "Lint changed C/C++ files (cppcheck)"
description = "Runs cppcheck against C/C++ files changed vs. origin/master plus local changes. clang-tidy/clazy are deferred -- see packaging/lint_cpp.py's module docstring."
entry = "uv run packaging/lint_cpp.py"
language = "system"
files = "\\.(cpp|h|c)$"
pass_filenames = false

[[repos.hooks]]
id = "mdbook-lint"
name = "Lint docs/ markdown"
description = "Runs mdbook-lint against docs/ (excluding the LID design tree). Routed through `sh -c` so $PWD expands -- MDBOOK005 mis-scopes its orphan-file scan when given a relative path (see docs/wiki/mdbook-lint-bugs.md)."
entry = "sh -c 'mdbook-lint lint -c docs/.mdbook-lint.toml \"$PWD/docs/SUMMARY.md\" \"$PWD/docs/wiki\" \"$PWD/docs/reference-repos.md\"'"
language = "system"
files = "^docs/(SUMMARY\\.md|wiki/|reference-repos\\.md|\\.mdbook-lint\\.toml)"
pass_filenames = false
